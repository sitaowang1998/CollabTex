services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: collabtex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DEV_POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collabtex"]
      interval: 1s
      timeout: 5s
      retries: 30

volumes:
  pgdata:
