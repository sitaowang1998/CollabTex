openapi: 3.1.0
info:
  title: CollabTex API
  version: 1.0.0
  description: Internal HTTP API contract for the current CollabTex backend.
servers:
  - url: http://localhost:3000
tags:
  - name: Health
  - name: Auth
  - name: Projects
  - name: Members
  - name: Documents
paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Check API health
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User authenticated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Return the authenticated user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/projects:
    get:
      tags:
        - Projects
      summary: List projects visible to the authenticated user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Projects visible to the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Projects
      summary: Create a new project owned by the authenticated user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Projects
      summary: Get project details for an authorized member
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetailsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Projects
      summary: Rename a project
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Projects
      summary: Soft-delete a project
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Project deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/members:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Members
      summary: List project members for an authorized project member
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Project members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Members
      summary: Add an existing user to the project
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProjectMemberRequest"
      responses:
        "201":
          description: Project member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/projects/{projectId}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/UserId"
    patch:
      tags:
        - Members
      summary: Update a project member role
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectMemberRequest"
      responses:
        "200":
          description: Updated project member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags:
        - Members
      summary: Remove a project member
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Project member removed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/projects/{projectId}/tree:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Documents
      summary: List the path-derived file tree for an authorized project member
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Derived file tree rooted at the project root
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFileTreeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/files:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      tags:
        - Documents
      summary: Create a file entry at an absolute project path
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFileRequest"
      responses:
        "201":
          description: File created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDocumentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/projects/{projectId}/nodes/move:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    patch:
      tags:
        - Documents
      summary: Move a file or folder to a different parent path
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveNodeRequest"
      responses:
        "204":
          description: Node moved successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/projects/{projectId}/nodes/rename:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    patch:
      tags:
        - Documents
      summary: Rename a file or folder within its current parent path
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameNodeRequest"
      responses:
        "204":
          description: Node renamed successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/projects/{projectId}/nodes:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    delete:
      tags:
        - Documents
      summary: Delete a file or all files under a folder path
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteNodeRequest"
      responses:
        "204":
          description: Node deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/files/content:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: path
        in: query
        required: true
        description: Absolute project path. Relative input is accepted and normalized to absolute form.
        schema:
          type: string
          minLength: 1
          maxLength: 1024
    get:
      tags:
        - Documents
      summary: Load file metadata and the current text content placeholder
      security:
        - BearerAuth: []
      responses:
        "200":
          description: File metadata and current content placeholder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDocumentContentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Project identifier
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User identifier
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed or token is missing
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated user is not allowed to perform the operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: The request conflicts with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - ok
      properties:
        ok:
          type: boolean
          const: true
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
    AuthUser:
      type: object
      additionalProperties: false
      required:
        - id
        - email
        - name
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
    AuthResponse:
      type: object
      additionalProperties: false
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
    AuthMeResponse:
      type: object
      additionalProperties: false
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - name
        - password
      properties:
        email:
          type: string
          description: Leading and trailing whitespace is trimmed and the email is lowercased before validation.
          format: email
          minLength: 1
          maxLength: 320
        name:
          type: string
          description: Leading and trailing whitespace is trimmed before validation.
          minLength: 1
          maxLength: 120
        password:
          type: string
          description: Whitespace-only values are rejected.
          minLength: 1
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          description: Leading and trailing whitespace is trimmed and the email is lowercased before validation.
          format: email
          minLength: 1
          maxLength: 320
        password:
          type: string
          description: Whitespace-only values are rejected.
          minLength: 1
    ProjectRole:
      type: string
      enum:
        - admin
        - editor
        - commenter
        - reader
    DocumentKind:
      type: string
      enum:
        - text
        - binary
    Project:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 160
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProjectSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - myRole
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        myRole:
          $ref: "#/components/schemas/ProjectRole"
        updatedAt:
          type: string
          format: date-time
    ProjectListResponse:
      type: object
      additionalProperties: false
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSummary"
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Leading and trailing whitespace is trimmed; whitespace-only values are rejected.
          minLength: 1
          maxLength: 160
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Leading and trailing whitespace is trimmed; whitespace-only values are rejected.
          minLength: 1
          maxLength: 160
    ProjectMutationResponse:
      type: object
      additionalProperties: false
      required:
        - project
      properties:
        project:
          $ref: "#/components/schemas/Project"
    ProjectDetailsResponse:
      type: object
      additionalProperties: false
      required:
        - project
        - myRole
      properties:
        project:
          $ref: "#/components/schemas/Project"
        myRole:
          $ref: "#/components/schemas/ProjectRole"
    ProjectMember:
      type: object
      additionalProperties: false
      required:
        - userId
        - email
        - name
        - role
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/ProjectRole"
    AddProjectMemberRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - role
      properties:
        email:
          type: string
          description: Leading and trailing whitespace is trimmed and the email is lowercased before lookup.
          format: email
          minLength: 1
          maxLength: 320
        role:
          $ref: "#/components/schemas/ProjectRole"
    UpdateProjectMemberRequest:
      type: object
      additionalProperties: false
      required:
        - role
      properties:
        role:
          $ref: "#/components/schemas/ProjectRole"
    ProjectMemberResponse:
      type: object
      additionalProperties: false
      required:
        - member
      properties:
        member:
          $ref: "#/components/schemas/ProjectMember"
    ProjectMemberListResponse:
      type: object
      additionalProperties: false
      required:
        - members
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMember"
    ProjectDocument:
      type: object
      additionalProperties: false
      required:
        - id
        - path
        - kind
        - mime
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        path:
          type: string
          description: >-
            Absolute, non-root project path beginning with "/". Persisted
            document paths are already normalized and never contain empty
            segments, backslashes, or "."/".." segments.
          maxLength: 1024
        kind:
          $ref: "#/components/schemas/DocumentKind"
        mime:
          type:
            - string
            - "null"
          maxLength: 255
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FileTreeFileNode:
      type: object
      additionalProperties: false
      required:
        - type
        - name
        - path
        - documentId
        - documentKind
        - mime
      properties:
        type:
          type: string
          const: file
        name:
          type: string
        path:
          type: string
          description: >-
            Absolute, non-root project path beginning with "/". File paths are
            normalized and never contain empty segments.
        documentId:
          type: string
        documentKind:
          $ref: "#/components/schemas/DocumentKind"
        mime:
          type:
            - string
            - "null"
    FileTreeFolderNode:
      type: object
      additionalProperties: false
      required:
        - type
        - name
        - path
        - children
      properties:
        type:
          type: string
          const: folder
        name:
          type: string
        path:
          type: string
          description: >-
            Absolute, non-root project path beginning with "/". Folder paths
            are derived from normalized document path prefixes.
        children:
          type: array
          items:
            $ref: "#/components/schemas/FileTreeNode"
    FileTreeNode:
      oneOf:
        - $ref: "#/components/schemas/FileTreeFolderNode"
        - $ref: "#/components/schemas/FileTreeFileNode"
    ProjectFileTreeResponse:
      type: object
      additionalProperties: false
      required:
        - nodes
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/FileTreeNode"
    CreateFileRequest:
      type: object
      additionalProperties: false
      required:
        - path
        - kind
      properties:
        path:
          type: string
          description: >-
            Leading and trailing whitespace is trimmed. Relative input is
            accepted and normalized to an absolute project path with a single
            leading slash. The root path "/" is rejected, and paths with empty
            segments, backslashes, or "."/".." segments are invalid.
          minLength: 1
          maxLength: 1024
        kind:
          $ref: "#/components/schemas/DocumentKind"
        mime:
          type: string
          description: Leading and trailing whitespace is trimmed; empty strings become null.
          maxLength: 255
    MoveNodeRequest:
      type: object
      additionalProperties: false
      required:
        - path
        - destinationParentPath
      properties:
        path:
          type: string
          description: Relative input is accepted and normalized to an absolute project path.
          minLength: 1
          maxLength: 1024
        destinationParentPath:
          type:
            - string
            - "null"
          description: >-
            Null, empty string, or "/" moves the node to the project root.
            Non-root values are normalized to absolute project paths.
          maxLength: 1024
    RenameNodeRequest:
      type: object
      additionalProperties: false
      required:
        - path
        - name
      properties:
        path:
          type: string
          description: Relative input is accepted and normalized to an absolute project path.
          minLength: 1
          maxLength: 1024
        name:
          type: string
          description: >-
            New node name. The backend enforces a 1024-character limit on the
            full destination path (including leading "/" and parent
            segments), so the effective maximum name length also depends on the
            destination parent path length.
          minLength: 1
          maxLength: 1023
    DeleteNodeRequest:
      type: object
      additionalProperties: false
      required:
        - path
      properties:
        path:
          type: string
          description: Relative input is accepted and normalized to an absolute project path.
          minLength: 1
          maxLength: 1024
    ProjectDocumentResponse:
      type: object
      additionalProperties: false
      required:
        - document
      properties:
        document:
          $ref: "#/components/schemas/ProjectDocument"
    ProjectDocumentContentResponse:
      type: object
      additionalProperties: false
      required:
        - document
        - content
      properties:
        document:
          $ref: "#/components/schemas/ProjectDocument"
        content:
          type:
            - string
            - "null"
