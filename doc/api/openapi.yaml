openapi: 3.1.0
info:
  title: CollabTex API
  version: 1.0.0
  description: Internal HTTP API contract for the current CollabTex backend.
servers:
  - url: http://localhost:3000
tags:
  - name: Health
  - name: Auth
  - name: Projects
  - name: Members
  - name: Snapshots
  - name: Comments
  - name: Compile
  - name: Documents
paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Check API health
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User authenticated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Return the authenticated user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh the current token
      description: >-
        Accepts a valid (non-expired) Bearer token and returns a fresh token
        with a new expiry window. The caller must present a current token;
        expired tokens are rejected with 401.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/projects:
    get:
      tags:
        - Projects
      summary: List projects visible to the authenticated user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Projects visible to the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Projects
      summary: Create a new project owned by the authenticated user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Projects
      summary: Get project details for an authorized member
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetailsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Projects
      summary: Rename a project
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Projects
      summary: Soft-delete a project
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Project deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/main-document:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Projects
      summary: Get the main document for a project
      description: >-
        Returns the explicitly set main document. If none is set, falls back to
        `/main.tex` in the project tree. The fallback is only used when
        `/main.tex` is a text document. Returns null when neither exists.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Main document or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MainDocumentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Projects
      summary: Set the main document for a project
      description: >-
        Sets the compile entrypoint document. The document must exist in the
        project and be of kind `text`. Requires admin or editor role.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMainDocumentRequest"
      responses:
        "204":
          description: Main document set successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/members:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Members
      summary: List project members for an authorized project member
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Project members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Members
      summary: Add an existing user to the project
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProjectMemberRequest"
      responses:
        "201":
          description: Project member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/projects/{projectId}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/UserId"
    patch:
      tags:
        - Members
      summary: Update a project member role
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectMemberRequest"
      responses:
        "200":
          description: Updated project member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags:
        - Members
      summary: Remove a project member
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Project member removed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/projects/{projectId}/snapshots:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Snapshots
      summary: List immutable snapshot checkpoints for a project
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Project snapshots ordered newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSnapshotListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/snapshots/{snapshotId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/SnapshotId"
    get:
      tags:
        - Snapshots
      summary: View a historical snapshot with text document content and metadata
      security:
        - BearerAuth: []
      responses:
        "200":
          description: >-
            Snapshot metadata with text document contents and comment threads.
            Binary documents are included as metadata only; their content is not
            returned in this response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSnapshotContentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: The snapshot blob is invalid or stored in an unsupported format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The snapshot data blob could not be found or read due to an internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/projects/{projectId}/snapshots/{snapshotId}/restore:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/SnapshotId"
    post:
      tags:
        - Snapshots
      summary: Restore a snapshot as the live project state and checkpoint it again
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Snapshot restored and checkpointed as the newest snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSnapshotRestoreResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: The snapshot blob is invalid or stored in an unsupported format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The snapshot data blob could not be found or read due to an internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/projects/{projectId}/docs/{docId}/comments:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/DocId"
    get:
      tags:
        - Comments
      summary: List comment threads for a document
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Comment threads for the document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentThreadListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Comments
      summary: Create a new comment thread anchored to a text selection
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentThreadRequest"
      responses:
        "201":
          description: Comment thread created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentThreadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/threads/{threadId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ThreadId"
    patch:
      tags:
        - Comments
      summary: Update comment thread status (resolve/reopen)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentThreadRequest"
      responses:
        "200":
          description: Thread status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentThreadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/threads/{threadId}/reply:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ThreadId"
    post:
      tags:
        - Comments
      summary: Reply to an existing comment thread
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyToThreadRequest"
      responses:
        "201":
          description: Reply added to thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/tree:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Documents
      summary: List the path-derived file tree for an authorized project member
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Derived file tree rooted at the project root
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFileTreeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/files:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      tags:
        - Documents
      summary: Create a file entry at an absolute project path
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFileRequest"
      responses:
        "201":
          description: File created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDocumentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/projects/{projectId}/nodes/move:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    patch:
      tags:
        - Documents
      summary: Move a file or folder to a different parent path
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveNodeRequest"
      responses:
        "204":
          description: Node moved successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/projects/{projectId}/nodes/rename:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    patch:
      tags:
        - Documents
      summary: Rename a file or folder within its current parent path
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameNodeRequest"
      responses:
        "204":
          description: Node renamed successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/projects/{projectId}/nodes:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    delete:
      tags:
        - Documents
      summary: Delete a file or all files under a folder path
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteNodeRequest"
      responses:
        "204":
          description: Node deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/files/content:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: path
        in: query
        required: true
        description: Absolute project path. Relative input is accepted and normalized to absolute form.
        schema:
          type: string
          minLength: 1
          maxLength: 1024
    get:
      tags:
        - Documents
      summary: Load file metadata and the current text content placeholder
      security:
        - BearerAuth: []
      responses:
        "200":
          description: File metadata and current content placeholder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDocumentContentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{projectId}/files/{fileId}/content:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: fileId
        in: path
        required: true
        description: UUID of the binary document.
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Documents
      summary: Download binary file content
      description: >
        Returns the stored binary content for a document. Only binary-kind
        documents are accepted; requesting content for a text document
        returns 400. Requires project membership (any role).
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Binary file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Documents
      summary: Upload binary file content
      description: >
        Accepts a multipart file upload for a binary document. The uploaded
        content replaces any previously stored content for the document.
        Only binary-kind documents are accepted; uploading to a text document
        returns 400. Requires admin or editor role.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: The binary file to upload (max 50 MB).
      responses:
        "204":
          description: Content uploaded successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: Payload too large (uploaded file exceeds 50 MB limit)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/projects/{projectId}/compile:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      tags:
        - Compile
      summary: Trigger a LaTeX compile for the project
      description: >
        Triggers an in-memory LaTeX compile using the project's main document
        as the entrypoint. Requires admin or editor role. Only one compile per
        project at a time — concurrent requests return 409. The response is
        returned synchronously after compile completes. A `compile:done` socket
        event is also emitted to the project room. Note: the compile pipeline
        currently only includes text-based project files; binary assets such as
        images are not passed to the compiler, so projects that depend on such
        assets may fail to compile as expected.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Compile completed (check status field for success/failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompileResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Compile already in progress for this project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error during compile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/projects/{projectId}/compile/pdf:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Compile
      summary: Download the latest compiled PDF
      description: >
        Returns the PDF artifact from the most recent successful compile.
        Requires project membership (any role). Returns 404 if no successful
        build exists.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The compiled PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Unexpected server error during PDF retrieval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Project identifier
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User identifier
    DocId:
      name: docId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Document identifier
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Comment thread identifier
    SnapshotId:
      name: snapshotId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Snapshot identifier
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed or token is missing
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated user is not allowed to perform the operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: The request conflicts with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - ok
      properties:
        ok:
          type: boolean
          const: true
    CompileResult:
      type: object
      additionalProperties: false
      required:
        - status
        - logs
      properties:
        status:
          type: string
          enum:
            - success
            - failure
        logs:
          type: string
          description: LaTeX compiler output (stdout + stderr)
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
    AuthUser:
      type: object
      additionalProperties: false
      required:
        - id
        - email
        - name
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
    AuthResponse:
      type: object
      additionalProperties: false
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
    AuthMeResponse:
      type: object
      additionalProperties: false
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - name
        - password
      properties:
        email:
          type: string
          description: Leading and trailing whitespace is trimmed and the email is lowercased before validation.
          format: email
          minLength: 1
          maxLength: 320
        name:
          type: string
          description: Leading and trailing whitespace is trimmed before validation.
          minLength: 1
          maxLength: 120
        password:
          type: string
          description: Whitespace-only values are rejected.
          minLength: 1
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          description: Leading and trailing whitespace is trimmed and the email is lowercased before validation.
          format: email
          minLength: 1
          maxLength: 320
        password:
          type: string
          description: Whitespace-only values are rejected.
          minLength: 1
    ProjectRole:
      type: string
      enum:
        - admin
        - editor
        - commenter
        - reader
    DocumentKind:
      type: string
      enum:
        - text
        - binary
    Project:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 160
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProjectSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - myRole
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        myRole:
          $ref: "#/components/schemas/ProjectRole"
        updatedAt:
          type: string
          format: date-time
    ProjectSnapshot:
      type: object
      additionalProperties: false
      required:
        - id
        - projectId
        - message
        - authorId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        message:
          type:
            - string
            - "null"
        authorId:
          type:
            - string
            - "null"
          format: uuid
        createdAt:
          type: string
          format: date-time
    ProjectSnapshotListResponse:
      type: object
      additionalProperties: false
      required:
        - snapshots
      properties:
        snapshots:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSnapshot"
    ProjectSnapshotRestoreResponse:
      type: object
      additionalProperties: false
      required:
        - snapshot
      properties:
        snapshot:
          $ref: "#/components/schemas/ProjectSnapshot"
    ProjectSnapshotContentResponse:
      type: object
      additionalProperties: false
      required:
        - snapshot
        - documents
        - commentThreads
      properties:
        snapshot:
          $ref: "#/components/schemas/ProjectSnapshot"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotDocument"
        commentThreads:
          type:
            - array
            - "null"
          items:
            $ref: "#/components/schemas/SnapshotCommentThread"
    SnapshotDocument:
      type: object
      additionalProperties: false
      required:
        - documentId
        - path
        - kind
        - mime
        - textContent
      properties:
        documentId:
          type: string
          format: uuid
        path:
          type: string
        kind:
          type: string
          enum: [text, binary]
        mime:
          type:
            - string
            - "null"
        textContent:
          type:
            - string
            - "null"
          description: Full text content for text documents; null for binary documents.
    SnapshotCommentThread:
      type: object
      additionalProperties: false
      required:
        - id
        - documentId
        - status
        - startAnchor
        - endAnchor
        - quotedText
        - createdAt
        - updatedAt
        - comments
      properties:
        id:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, resolved]
        startAnchor:
          type: string
        endAnchor:
          type: string
        quotedText:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        comments:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotComment"
    SnapshotComment:
      type: object
      additionalProperties: false
      required:
        - id
        - authorId
        - body
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        authorId:
          type:
            - string
            - "null"
          format: uuid
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    ProjectListResponse:
      type: object
      additionalProperties: false
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSummary"
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Leading and trailing whitespace is trimmed; whitespace-only values are rejected.
          minLength: 1
          maxLength: 160
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Leading and trailing whitespace is trimmed; whitespace-only values are rejected.
          minLength: 1
          maxLength: 160
    SetMainDocumentRequest:
      type: object
      additionalProperties: false
      required:
        - documentId
      properties:
        documentId:
          type: string
          format: uuid
          description: The document to set as the main compile entrypoint.
    MainDocumentResponse:
      type: object
      additionalProperties: false
      required:
        - mainDocument
      properties:
        mainDocument:
          oneOf:
            - $ref: "#/components/schemas/ProjectDocument"
            - type: "null"
    ProjectMutationResponse:
      type: object
      additionalProperties: false
      required:
        - project
      properties:
        project:
          $ref: "#/components/schemas/Project"
    ProjectDetailsResponse:
      type: object
      additionalProperties: false
      required:
        - project
        - myRole
      properties:
        project:
          $ref: "#/components/schemas/Project"
        myRole:
          $ref: "#/components/schemas/ProjectRole"
    ProjectMember:
      type: object
      additionalProperties: false
      required:
        - userId
        - email
        - name
        - role
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/ProjectRole"
    AddProjectMemberRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - role
      properties:
        email:
          type: string
          description: Leading and trailing whitespace is trimmed and the email is lowercased before lookup.
          format: email
          minLength: 1
          maxLength: 320
        role:
          $ref: "#/components/schemas/ProjectRole"
    UpdateProjectMemberRequest:
      type: object
      additionalProperties: false
      required:
        - role
      properties:
        role:
          $ref: "#/components/schemas/ProjectRole"
    ProjectMemberResponse:
      type: object
      additionalProperties: false
      required:
        - member
      properties:
        member:
          $ref: "#/components/schemas/ProjectMember"
    ProjectMemberListResponse:
      type: object
      additionalProperties: false
      required:
        - members
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMember"
    ProjectDocument:
      type: object
      additionalProperties: false
      required:
        - id
        - path
        - kind
        - mime
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        path:
          type: string
          description: >-
            Absolute, non-root project path beginning with "/". Persisted
            document paths are already normalized and never contain empty
            segments, backslashes, or "."/".." segments.
          maxLength: 1024
        kind:
          $ref: "#/components/schemas/DocumentKind"
        mime:
          type:
            - string
            - "null"
          maxLength: 255
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FileTreeFileNode:
      type: object
      additionalProperties: false
      required:
        - type
        - name
        - path
        - documentId
        - documentKind
        - mime
      properties:
        type:
          type: string
          const: file
        name:
          type: string
        path:
          type: string
          description: >-
            Absolute, non-root project path beginning with "/". File paths are
            normalized and never contain empty segments.
        documentId:
          type: string
        documentKind:
          $ref: "#/components/schemas/DocumentKind"
        mime:
          type:
            - string
            - "null"
    FileTreeFolderNode:
      type: object
      additionalProperties: false
      required:
        - type
        - name
        - path
        - children
      properties:
        type:
          type: string
          const: folder
        name:
          type: string
        path:
          type: string
          description: >-
            Absolute, non-root project path beginning with "/". Folder paths
            are derived from normalized document path prefixes.
        children:
          type: array
          items:
            $ref: "#/components/schemas/FileTreeNode"
    FileTreeNode:
      oneOf:
        - $ref: "#/components/schemas/FileTreeFolderNode"
        - $ref: "#/components/schemas/FileTreeFileNode"
    ProjectFileTreeResponse:
      type: object
      additionalProperties: false
      required:
        - nodes
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/FileTreeNode"
    CreateFileRequest:
      type: object
      additionalProperties: false
      required:
        - path
        - kind
      properties:
        path:
          type: string
          description: >-
            Leading and trailing whitespace is trimmed. Relative input is
            accepted and normalized to an absolute project path with a single
            leading slash. The root path "/" is rejected, and paths with empty
            segments, backslashes, or "."/".." segments are invalid.
          minLength: 1
          maxLength: 1024
        kind:
          $ref: "#/components/schemas/DocumentKind"
        mime:
          type: string
          description: Leading and trailing whitespace is trimmed; empty strings become null.
          maxLength: 255
    MoveNodeRequest:
      type: object
      additionalProperties: false
      required:
        - path
        - destinationParentPath
      properties:
        path:
          type: string
          description: Relative input is accepted and normalized to an absolute project path.
          minLength: 1
          maxLength: 1024
        destinationParentPath:
          type:
            - string
            - "null"
          description: >-
            Null, empty string, or "/" moves the node to the project root.
            Non-root values are normalized to absolute project paths.
          maxLength: 1024
    RenameNodeRequest:
      type: object
      additionalProperties: false
      required:
        - path
        - name
      properties:
        path:
          type: string
          description: Relative input is accepted and normalized to an absolute project path.
          minLength: 1
          maxLength: 1024
        name:
          type: string
          description: >-
            New node name. The backend enforces a 1024-character limit on the
            full destination path (including leading "/" and parent
            segments), so the effective maximum name length also depends on the
            destination parent path length.
          minLength: 1
          maxLength: 1023
    DeleteNodeRequest:
      type: object
      additionalProperties: false
      required:
        - path
      properties:
        path:
          type: string
          description: Relative input is accepted and normalized to an absolute project path.
          minLength: 1
          maxLength: 1024
    ProjectDocumentResponse:
      type: object
      additionalProperties: false
      required:
        - document
      properties:
        document:
          $ref: "#/components/schemas/ProjectDocument"
    ProjectDocumentContentResponse:
      type: object
      additionalProperties: false
      required:
        - document
        - content
      properties:
        document:
          $ref: "#/components/schemas/ProjectDocument"
        content:
          type:
            - string
            - "null"
    CommentThreadStatus:
      type: string
      enum:
        - open
        - resolved
    Comment:
      type: object
      additionalProperties: false
      required:
        - id
        - threadId
        - authorId
        - body
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        threadId:
          type: string
          format: uuid
        authorId:
          type:
            - string
            - "null"
          format: uuid
        authorName:
          type:
            - string
            - "null"
          description: Display name of the comment author
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    CommentThread:
      type: object
      additionalProperties: false
      required:
        - id
        - documentId
        - projectId
        - status
        - startAnchor
        - endAnchor
        - quotedText
        - createdAt
        - updatedAt
        - comments
      properties:
        id:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/CommentThreadStatus"
        startAnchor:
          type: string
          description: >-
            Opaque start anchor of the text selection (up to 1024 characters).
            Same value as startAnchorB64 in the create request.
          maxLength: 1024
        endAnchor:
          type: string
          description: >-
            Opaque end anchor of the text selection (up to 1024 characters).
            Same value as endAnchorB64 in the create request.
          maxLength: 1024
        quotedText:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
    CreateCommentThreadRequest:
      type: object
      additionalProperties: false
      required:
        - startAnchorB64
        - endAnchorB64
        - quotedText
        - body
      properties:
        startAnchorB64:
          type: string
          description: Opaque start anchor of the text selection (up to 1024 characters).
          minLength: 1
          maxLength: 1024
        endAnchorB64:
          type: string
          description: Opaque end anchor of the text selection (up to 1024 characters).
          minLength: 1
          maxLength: 1024
        quotedText:
          type: string
          description: The selected text at thread creation time.
          minLength: 1
          maxLength: 10000
        body:
          type: string
          description: The initial comment body.
          minLength: 1
          maxLength: 10000
    UpdateCommentThreadRequest:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/CommentThreadStatus"
    ReplyToThreadRequest:
      type: object
      additionalProperties: false
      required:
        - body
      properties:
        body:
          type: string
          description: The reply comment body.
          minLength: 1
          maxLength: 10000
    CommentThreadListResponse:
      type: object
      additionalProperties: false
      required:
        - threads
      properties:
        threads:
          type: array
          items:
            $ref: "#/components/schemas/CommentThread"
    CommentThreadResponse:
      type: object
      additionalProperties: false
      required:
        - thread
      properties:
        thread:
          $ref: "#/components/schemas/CommentThread"
    CommentResponse:
      type: object
      additionalProperties: false
      required:
        - comment
      properties:
        comment:
          $ref: "#/components/schemas/Comment"
