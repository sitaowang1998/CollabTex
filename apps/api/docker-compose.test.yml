services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: collabtex_api_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${TEST_POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collabtex_api_test"]
      interval: 1s
      timeout: 5s
      retries: 30
