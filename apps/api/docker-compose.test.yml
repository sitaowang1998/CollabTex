services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: collabtex_api_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${TEST_POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collabtex_api_test"]
      interval: 1s
      timeout: 5s
      retries: 30

  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: s3
      LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: 1
    ports:
      - "${TEST_LOCALSTACK_PORT:-4566}:4566"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:4566/_localstack/health || exit 1",
        ]
      interval: 2s
      timeout: 10s
      retries: 15
